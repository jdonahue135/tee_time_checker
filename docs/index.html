<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tee Time Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f7f4; color: #1a1a1a; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #444; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    label:first-of-type { margin-top: 0; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: #fafafa; }
    input:focus, select:focus { outline: none; border-color: #4a7c59; background: white; }
    input[type="password"] { font-family: monospace; }
    .btn { display: inline-block; padding: 0.6rem 1.25rem; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; font-weight: 500; }
    .btn-primary { background: #4a7c59; color: white; }
    .btn-primary:hover { background: #3a6348; }
    .btn-secondary { background: #e8f0eb; color: #4a7c59; margin-left: 0.5rem; }
    .btn-secondary:hover { background: #d4e6da; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .actions { margin-top: 1.25rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .status { font-size: 0.85rem; padding: 0.4rem 0.75rem; border-radius: 5px; }
    .status.success { background: #e6f4ea; color: #276b3a; }
    .status.error { background: #fdecea; color: #b71c1c; }
    .status.info { background: #e8f0fe; color: #1a56db; }
    details { margin-top: 0.5rem; }
    summary { cursor: pointer; font-size: 0.85rem; color: #666; }
    .advanced { padding-top: 0.75rem; }
    #pat-section { border-left: 3px solid #4a7c59; padding-left: 1rem; }
    .toggle-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; }
    .email-input-row { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .email-input-row input { flex: 1; }
    .email-input-row input:invalid { border-color: #e57373; }
    .email-tags { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .email-tag { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0.6rem; border-radius: 6px; background: #f0f0f0; font-size: 0.9rem; }
    .email-tag.disabled { opacity: 0.45; }
    .email-tag-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .tag-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 0.1rem 0.3rem; border-radius: 4px; color: #555; }
    .tag-btn:hover { background: #ddd; }
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: .2s; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #4a7c59; }
    input:checked + .slider:before { transform: translateX(20px); }
    .toggle-label { font-size: 0.9rem; font-weight: 500; }
  </style>
</head>
<body>
  <h1>⛳ Tee Time Checker</h1>
  <p class="subtitle">Configure and trigger tee time alerts</p>

  <div class="card">
    <h2>Search Settings</h2>

    <label for="course">Course</label>
    <select id="course"></select>

    <label for="target-date">Date</label>
    <input type="date" id="target-date" />

    <label for="time-of-day">Time of Day</label>
    <select id="time-of-day"></select>

    <label for="players">Players</label>
    <select id="players"></select>

    <details>
      <summary>Advanced</summary>
      <div class="advanced">
        <label for="booking-class">Booking Class ID</label>
        <input type="text" id="booking-class" />
        <label for="schedule-ids">Schedule IDs (comma-separated)</label>
        <input type="text" id="schedule-ids" />
      </div>
    </details>

    <div class="actions">
      <button class="btn btn-primary" id="save-btn" onclick="saveAll()">Save Settings</button>
      <button class="btn btn-secondary" id="run-btn" onclick="runWorkflow()">Run Check Now</button>
      <span id="status" class="status" style="display:none"></span>
    </div>
  </div>

  <div class="card">
    <h2>Recipients</h2>
    <label>Email Addresses</label>
    <div class="email-input-row">
      <input type="email" id="email-input" placeholder="name@example.com" />
      <button class="btn btn-secondary" style="margin-left:0;" onclick="addEmail()">Add</button>
    </div>
    <div class="email-tags" id="email-tags"></div>
    <div class="actions">
      <button class="btn btn-primary" id="recipients-save-btn" onclick="saveRecipients()">Save Recipients</button>
      <span id="recipients-status" class="status" style="display:none"></span>
    </div>
  </div>

  <div class="card">
    <h2>Cron Schedule</h2>

    <div class="toggle-row" style="margin-top:0;">
      <label class="toggle">
        <input type="checkbox" id="cron-enabled" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label" id="cron-enabled-label">Loading…</span>
    </div>

    <div id="cron-last-run" style="display:none;margin-top:1rem;"></div>

    <label for="cron-interval" style="margin-top:1rem;">Check Interval</label>
    <select id="cron-interval">
      <option value="5">Every 5 minutes</option>
      <option value="10">Every 10 minutes</option>
      <option value="15">Every 15 minutes</option>
      <option value="30">Every 30 minutes</option>
      <option value="60">Every hour</option>
    </select>

    <details>
      <summary>Advanced</summary>
      <div class="advanced">
        <label for="cron-api-key">cron-job.org API Key</label>
        <input type="password" id="cron-api-key" placeholder="API key from cron-job.org" autocomplete="off" />
        <label for="cron-job-id">Job ID</label>
        <input type="text" id="cron-job-id" placeholder="e.g. 1234567" />
      </div>
    </details>

    <div class="actions">
      <button class="btn btn-primary" id="cron-save-btn" onclick="saveCronJob()">Save Schedule</button>
      <span id="cron-status" class="status" style="display:none"></span>
    </div>
  </div>

  <div class="card" id="pat-section">
    <details>
      <summary>GitHub Access</summary>
      <div class="advanced">
        <label for="pat">Personal Access Token (repo scope)</label>
        <input type="password" id="pat" placeholder="ghp_..." autocomplete="off" />
        <p style="font-size:0.8rem;color:#888;margin-top:0.4rem;">Stored locally in your browser. Never sent anywhere except api.github.com.</p>
      </div>
    </details>
  </div>

  <script>
    const OWNER = 'jdonahue135';
    const REPO = 'tee_time_checker';
    const WORKFLOW_FILE = 'check_tee_times.yml';

    const VAR_NAMES = ['TARGET_DATE', 'TIME_OF_DAY', 'PLAYERS', 'BOOKING_CLASS', 'SCHEDULE_ID', 'SCHEDULE_IDS', 'EMAIL_RECEIVERS'];

    function getPAT() { return document.getElementById('pat').value.trim(); }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      el.style.display = 'inline-block';
      if (type === 'success') setTimeout(() => el.style.display = 'none', 4000);
    }

    async function ghFetch(path, options = {}) {
      const pat = getPAT();
      if (!pat) { showStatus('Enter a GitHub PAT first', 'error'); throw new Error('No PAT'); }
      const res = await fetch(`https://api.github.com${path}`, {
        ...options,
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      return res;
    }

    async function getVar(name) {
      const res = await ghFetch(`/repos/${OWNER}/${REPO}/actions/variables/${name}`);
      if (res.status === 404) return null;
      if (!res.ok) return null;
      const data = await res.json();
      return data.value;
    }

    async function setVar(name, value) {
      const existing = await ghFetch(`/repos/${OWNER}/${REPO}/actions/variables/${name}`);
      if (existing.status === 404) {
        await ghFetch(`/repos/${OWNER}/${REPO}/actions/variables`, {
          method: 'POST',
          body: JSON.stringify({ name, value })
        });
      } else {
        await ghFetch(`/repos/${OWNER}/${REPO}/actions/variables/${name}`, {
          method: 'PATCH',
          body: JSON.stringify({ name, value })
        });
      }
    }

    // Format date: input value is YYYY-MM-DD, API wants MM-DD-YYYY
    function toApiDate(val) {
      if (!val) return '';
      const [y, m, d] = val.split('-');
      return `${m}-${d}-${y}`;
    }
    function fromApiDate(val) {
      if (!val) return '';
      const [m, d, y] = val.split('-');
      return `${y}-${m}-${d}`;
    }

    async function loadEnums() {
      const res = await fetch('enums.json');
      return res.json();
    }

    async function init() {
      // Restore PAT from localStorage
      const saved = localStorage.getItem('gh_pat');
      if (saved) document.getElementById('pat').value = saved;
      const cronKey = localStorage.getItem('cron_api_key');
      if (cronKey) document.getElementById('cron-api-key').value = cronKey;
      const cronJobId = localStorage.getItem('cron_job_id');
      if (cronJobId) document.getElementById('cron-job-id').value = cronJobId;
      document.getElementById('pat').addEventListener('change', () => {
        localStorage.setItem('gh_pat', document.getElementById('pat').value.trim());
      });

      const enums = await loadEnums();

      // Populate course dropdown
      const courseEl = document.getElementById('course');
      for (const [id, name] of Object.entries(enums.COURSES)) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        courseEl.appendChild(opt);
      }

      // Populate time dropdown
      const timeEl = document.getElementById('time-of-day');
      for (const t of enums.TIME_OF_DAY) {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
        timeEl.appendChild(opt);
      }

      // Populate players dropdown
      const playersEl = document.getElementById('players');
      for (const p of enums.PLAYERS) {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p === '0' ? '0 (any)' : p;
        playersEl.appendChild(opt);
      }

      renderEmailTags();
      // Load current values from GH if PAT is set
      if (getPAT()) await loadCurrentValues();
      // Load cron job state if credentials are saved
      if (cronKey && cronJobId) await loadCronJob();
      else document.getElementById('cron-enabled-label').textContent = 'Unknown';
    }

    async function loadCurrentValues() {
      showStatus('Loading current settings…', 'info');
      try {
        const [date, time, players, bookingClass, scheduleId, scheduleIds, emailReceivers] = await Promise.all(
          VAR_NAMES.map(getVar)
        );
        if (date) document.getElementById('target-date').value = fromApiDate(date);
        if (time) document.getElementById('time-of-day').value = time;
        if (players) document.getElementById('players').value = players;
        if (bookingClass) document.getElementById('booking-class').value = bookingClass;
        if (scheduleId) document.getElementById('course').value = scheduleId;
        if (scheduleIds) document.getElementById('schedule-ids').value = scheduleIds;
        if (emailReceivers) loadEmailTags(emailReceivers);
        document.getElementById('status').style.display = 'none';
      } catch (e) {
        showStatus('Failed to load settings', 'error');
      }
    }

    async function saveAll() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      showStatus('Saving…', 'info');
      try {
        const courseId = document.getElementById('course').value;
        const dateVal = toApiDate(document.getElementById('target-date').value);
        const time = document.getElementById('time-of-day').value;
        const players = document.getElementById('players').value;
        const bookingClass = document.getElementById('booking-class').value;
        const scheduleIds = document.getElementById('schedule-ids').value;

        await Promise.all([
          dateVal && setVar('TARGET_DATE', dateVal),
          setVar('TIME_OF_DAY', time),
          setVar('PLAYERS', players),
          bookingClass && setVar('BOOKING_CLASS', bookingClass),
          setVar('SCHEDULE_ID', courseId),
          scheduleIds && setVar('SCHEDULE_IDS', scheduleIds),
        ].filter(Boolean));

        showStatus('Settings saved', 'success');
      } catch (e) {
        showStatus('Save failed: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    // --- Recipients ---
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function getEmailList() {
      try { return JSON.parse(localStorage.getItem('email_list') || '[]'); } catch { return []; }
    }
    function saveEmailList(list) {
      localStorage.setItem('email_list', JSON.stringify(list));
    }

    function renderEmailTags() {
      const list = getEmailList();
      const container = document.getElementById('email-tags');
      container.innerHTML = '';
      list.forEach((entry, i) => {
        const tag = document.createElement('div');
        tag.className = 'email-tag' + (entry.enabled ? '' : ' disabled');
        tag.innerHTML = `
          <span>${entry.email}</span>
          <span class="email-tag-actions">
            <button class="tag-btn" title="${entry.enabled ? 'Disable' : 'Enable'}" onclick="toggleEmail(${i})">${entry.enabled ? 'Disable' : 'Enable'}</button>
            <button class="tag-btn" title="Remove" onclick="removeEmail(${i})">✕</button>
          </span>
        `;
        container.appendChild(tag);
      });
    }

    function loadEmailTags(csvValue) {
      const fromGh = csvValue.split(',').map(e => e.trim()).filter(Boolean);
      const stored = getEmailList();
      const storedEmails = stored.map(e => e.email);
      // Merge: add any from GH not already in local list as enabled
      fromGh.forEach(email => {
        if (!storedEmails.includes(email)) stored.push({ email, enabled: true });
      });
      saveEmailList(stored);
      renderEmailTags();
    }

    function addEmail() {
      const input = document.getElementById('email-input');
      const val = input.value.trim();
      if (!EMAIL_RE.test(val)) { input.setCustomValidity('Invalid email'); input.reportValidity(); return; }
      input.setCustomValidity('');
      const list = getEmailList();
      if (list.some(e => e.email === val)) { input.value = ''; return; }
      list.push({ email: val, enabled: true });
      saveEmailList(list);
      renderEmailTags();
      input.value = '';
    }

    function toggleEmail(i) {
      const list = getEmailList();
      list[i].enabled = !list[i].enabled;
      saveEmailList(list);
      renderEmailTags();
    }

    function removeEmail(i) {
      const list = getEmailList();
      list.splice(i, 1);
      saveEmailList(list);
      renderEmailTags();
    }

    function showRecipientsStatus(msg, type) {
      const el = document.getElementById('recipients-status');
      el.textContent = msg;
      el.className = 'status ' + type;
      el.style.display = 'inline-block';
      if (type === 'success') setTimeout(() => el.style.display = 'none', 4000);
    }

    async function saveRecipients() {
      const btn = document.getElementById('recipients-save-btn');
      btn.disabled = true;
      showRecipientsStatus('Saving…', 'info');
      try {
        const enabled = getEmailList().filter(e => e.enabled).map(e => e.email).join(',');
        await setVar('EMAIL_RECEIVERS', enabled);
        showRecipientsStatus('Saved', 'success');
      } catch (e) {
        showRecipientsStatus('Save failed: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addEmail(); }
    });

    async function runWorkflow() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      showStatus('Triggering workflow…', 'info');
      try {
        const res = await ghFetch(`/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`, {
          method: 'POST',
          body: JSON.stringify({ ref: 'main' })
        });
        if (res.status === 204) {
          showStatus('Workflow triggered', 'success');
        } else {
          const data = await res.json().catch(() => ({}));
          showStatus('Failed: ' + (data.message || res.status), 'error');
        }
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    function getCronKey() { return document.getElementById('cron-api-key').value.trim(); }
    function getCronJobId() { return document.getElementById('cron-job-id').value.trim(); }

    function showCronStatus(msg, type) {
      const el = document.getElementById('cron-status');
      el.textContent = msg;
      el.className = 'status ' + type;
      el.style.display = 'inline-block';
      if (type === 'success') setTimeout(() => el.style.display = 'none', 4000);
    }

    async function cronFetch(jobId, method = 'GET', body = null) {
      const key = getCronKey();
      if (!key) { showCronStatus('Enter a cron-job.org API key first', 'error'); throw new Error('No key'); }
      const opts = {
        method,
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }
      };
      if (body) opts.body = JSON.stringify(body);
      return fetch(`https://api.cron-job.org/jobs/${jobId}`, opts);
    }

    function minutesForInterval(interval) {
      const mins = [];
      for (let i = 0; i < 60; i += interval) mins.push(i);
      return mins;
    }

    function intervalFromMinutes(minutes) {
      if (!minutes || minutes.length === 0 || minutes[0] === -1) return 5;
      if (minutes.length === 1) return 60;
      return minutes[1] - minutes[0];
    }

    async function loadCronJob() {
      const jobId = getCronJobId();
      if (!jobId) { showCronStatus('Enter a Job ID first', 'error'); return; }
      const btn = document.getElementById('cron-load-btn');
      btn.disabled = true;
      showCronStatus('Loading…', 'info');
      try {
        const res = await cronFetch(jobId);
        if (!res.ok) { showCronStatus('Failed to load: ' + res.status, 'error'); return; }
        const data = await res.json();
        const job = data.jobDetails || data.job || data;
        const enabled = job.enabled !== false;
        document.getElementById('cron-enabled').checked = enabled;
        document.getElementById('cron-enabled-label').textContent = enabled ? 'Enabled' : 'Disabled';
        const interval = intervalFromMinutes(job.schedule?.minutes);
        document.getElementById('cron-interval').value = String(interval);

        const lastRunEl = document.getElementById('cron-last-run');
        if (job.lastExecution) {
          const statusMap = { 1: '✅ OK', 0: '❌ Failed', 2: '⚠️ Error' };
          const fmt = ts => new Date(ts * 1000).toLocaleString([], { month: 'numeric', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
          const dur = job.lastDuration ? `${(job.lastDuration / 1000).toFixed(1)}s` : '—';
          const status = statusMap[job.lastStatus] ?? job.lastStatus;
          lastRunEl.innerHTML = `
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
              <div>
                <div style="font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.2rem;">Last Run</div>
                <div style="font-size:0.95rem;">${fmt(job.lastExecution)}</div>
                <div style="font-size:0.85rem;color:#555;margin-top:0.1rem;">${status} &middot; ${dur}</div>
              </div>
              <div>
                <div style="font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.2rem;">Next Run</div>
                <div style="font-size:0.95rem;">${job.nextExecution ? fmt(job.nextExecution) : '—'}</div>
              </div>
            </div>
          `;
          lastRunEl.style.display = 'block';
        }
        showCronStatus('Loaded', 'success');
      } catch (e) {
        showCronStatus('Error: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    async function saveCronJob() {
      const jobId = getCronJobId();
      if (!jobId) { showCronStatus('Enter a Job ID first', 'error'); return; }
      const btn = document.getElementById('cron-save-btn');
      btn.disabled = true;
      showCronStatus('Saving…', 'info');
      try {
        const enabled = document.getElementById('cron-enabled').checked;
        const interval = parseInt(document.getElementById('cron-interval').value, 10);
        const minutes = minutesForInterval(interval);
        const res = await cronFetch(jobId, 'PATCH', {
          job: {
            enabled,
            schedule: { hours: [-1], mdays: [-1], minutes, months: [-1], wdays: [-1] }
          }
        });
        if (res.ok) {
          document.getElementById('cron-enabled-label').textContent = enabled ? 'Enabled' : 'Disabled';
          showCronStatus('Schedule saved', 'success');
        } else {
          const d = await res.json().catch(() => ({}));
          showCronStatus('Failed: ' + (d.error || d.message || res.status), 'error');
        }
      } catch (e) {
        showCronStatus('Error: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    document.getElementById('cron-api-key').addEventListener('change', () => {
      localStorage.setItem('cron_api_key', document.getElementById('cron-api-key').value.trim());
    });
    document.getElementById('cron-job-id').addEventListener('change', () => {
      localStorage.setItem('cron_job_id', document.getElementById('cron-job-id').value.trim());
    });
    document.getElementById('cron-enabled').addEventListener('change', () => {
      document.getElementById('cron-enabled-label').textContent =
        document.getElementById('cron-enabled').checked ? 'Enabled' : 'Disabled';
    });

    init();
  </script>
</body>
</html>
