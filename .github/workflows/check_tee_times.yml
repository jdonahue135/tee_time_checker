name: Check Tee Times

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS }}
  SEARCH_CONFIGS: ${{ vars.SEARCH_CONFIGS }}
  BOOKING_CLASS: ${{ vars.BOOKING_CLASS }}
  SCHEDULE_ID: ${{ vars.SCHEDULE_ID }}
  SCHEDULE_IDS: ${{ vars.SCHEDULE_IDS }}
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen tee times from cache
        uses: actions/cache@v3
        with:
          path: last_sent_*.txt
          key: last-sent-${{ github.run_id }}
          restore-keys: |
            last-sent-

      - name: Run tee time checker
        run: python fore_up_checker.py

      - name: Save seen tee times to cache
        uses: actions/cache/save@v3
        with:
          path: last_sent_*.txt
          key: last-sent-${{ github.run_id }}
